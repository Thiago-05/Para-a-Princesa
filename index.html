<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Acesso</title>

<style>
:root{
  --pink1:#ff4fa3;
  --pink2:#ff77b9;
  --pink3:#ff9fd2;
  --card:#ffffff22;
  --card2:#ffffff18;
  --text:#ffffff;
  --shadow: 0 20px 60px rgba(0,0,0,.35);
}

*{box-sizing:border-box}
html,body{height:100%}

body{
  margin:0;
  font-family: system-ui;
  color: var(--text);
  overflow:hidden;
}

.screen{
  position:fixed; inset:0;
  display:grid;
  place-items:center;
}

.bg-pink{
  background: linear-gradient(180deg, var(--pink1), var(--pink2), var(--pink3));
}

.bg-dark{
  background:#07070a;
}

.card{
  padding:25px;
  border-radius:20px;
  background: var(--card);
  backdrop-filter: blur(10px);
  text-align:center;
}

.code{
  display:flex;
  gap:10px;
  justify-content:center;
}

.digit{
  width:55px;
  height:60px;
  font-size:28px;
  text-align:center;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.hide{display:none}

/* TEXTO CENTRAL */
#loveText{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:40px;
  text-align:center;
  z-index:20;
  color:#ff77b9;
  text-shadow:
    0 0 10px #ff77b9,
    0 0 20px #ff4fa3,
    0 0 40px #ff4fa3;
}

/* CANVAS CORAÇÕES */
#heartsCanvas{
  position:absolute;
  inset:0;
  z-index:5;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen bg-pink">
  <div class="card">
    <h2>Digite a senha</h2>

    <div class="code">
      <input class="digit" maxlength="1">
      <input class="digit" maxlength="1">
      <input class="digit" maxlength="1">
      <input class="digit" maxlength="1">
    </div>

    <button onclick="validate()">Entrar</button>
    <p id="status"></p>
  </div>
</div>

<!-- FINAL -->
<div id="animScreen" class="screen bg-dark hide">
  <h1 id="loveText">Eu adoro você Luna ❤️ !</h1>
  <canvas id="heartsCanvas"></canvas>
</div>

<script>
const CORRECT_PASSWORD = "2603";
const digits = document.querySelectorAll(".digit");

function getCode(){
  return [...digits].map(d=>d.value).join("");
}

function validate(){
  if(getCode() === CORRECT_PASSWORD){
    document.getElementById("loginScreen").classList.add("hide");
    document.getElementById("animScreen").classList.remove("hide");
    startHearts();
  }else{
    document.getElementById("status").innerText="Senha incorreta";
  }
}

/* AUTO AVANÇAR */
digits.forEach((d,i)=>{
  d.addEventListener("input",()=>{
    if(d.value && i<3) digits[i+1].focus();
  });
});

/* CORAÇÕES */
const canvas = document.getElementById("heartsCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let hearts=[];

function createHeart(){
  return {
    x: Math.random()*canvas.width,
    y: canvas.height + 20,
    size: Math.random()*6+2,
    speed: Math.random()*1.5+0.5,
    alpha: Math.random()
  };
}

function startHearts(){
  hearts=[];
  for(let i=0;i<120;i++){
    hearts.push(createHeart());
  }
  animate();
}

function drawHeart(x,y,size){
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.bezierCurveTo(x-size,y-size,x-2*size,y+size,x,y+2*size);
  ctx.bezierCurveTo(x+2*size,y+size,x+size,y-size,x,y);
  ctx.fill();
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  hearts.forEach(h=>{
    h.y -= h.speed;

    ctx.fillStyle = `rgba(255,105,180,${h.alpha})`;
    drawHeart(h.x,h.y,h.size);

    if(h.y < -10){
      Object.assign(h, createHeart());
    }
  });

  requestAnimationFrame(animate);
}
</script>

</body>
</html>
