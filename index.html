<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Acesso</title>

<style>
:root{
  --pink1:#ff4fa3;
  --pink2:#ff77b9;
  --pink3:#ff9fd2;
}

body{
  margin:0;
  font-family: Arial, sans-serif;
  overflow:hidden;
  color:white;
}

.screen{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

.bg-pink{
  background: linear-gradient(180deg, var(--pink1), var(--pink2), var(--pink3));
}

.bg-dark{
  background:#07070a;
}

.card{
  background:#ffffff22;
  padding:20px;
  border-radius:20px;
  text-align:center;
}

.digit{
  width:50px;
  height:60px;
  font-size:24px;
  margin:5px;
  text-align:center;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.hide{display:none;}

/* TEXTO */
#loveText{
  position:absolute;
  top:80px;
  left:50%;
  transform:translateX(-50%);
  font-size:36px;
  color:#ff77b9;
  z-index:10;
  pointer-events:none;
  white-space:nowrap;
}

/* CANVAS */
canvas{
  position:relative;
  z-index:1;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen bg-pink">
  <div class="card">
    <h2>Digite a senha</h2>

    <div>
      <input class="digit" maxlength="1">
      <input class="digit" maxlength="1">
      <input class="digit" maxlength="1">
      <input class="digit" maxlength="1">
    </div>

    <br>
    <button onclick="validate()">Entrar</button>
    <p id="status"></p>
  </div>
</div>

<!-- ANIMAÇÃO -->
<div id="animScreen" class="screen bg-dark hide">
  <h1 id="loveText"></h1>
  <canvas id="canvas"></canvas>
</div>

<script>
const CORRECT_PASSWORD = "2603";

const digits = document.querySelectorAll(".digit");
const statusEl = document.getElementById("status");
const loginScreen = document.getElementById("loginScreen");
const animScreen = document.getElementById("animScreen");

function getCode(){
  return [...digits].map(d => d.value).join("");
}

function validate(){
  const code = getCode();

  if(code === CORRECT_PASSWORD){
    statusEl.innerText = "Entrando...";

    setTimeout(()=>{
      loginScreen.classList.add("hide");
      animScreen.classList.remove("hide");

      startAnimation();

      setTimeout(()=>{
        typeText("Eu adoro você, Luna ❤️", "loveText", 80);
      },600);

    },500);

  } else {
    statusEl.innerText = "Senha incorreta";
  }
}

/* TEXTO DIGITANDO */
function typeText(text, id, speed){
  const el = document.getElementById(id);
  el.textContent="";
  let i=0;

  function write(){
    if(i<text.length){
      el.textContent += text[i];
      i++;
      setTimeout(write, speed);
    } else {
      glow(el);
    }
  }
  write();
}

/* BRILHO */
function glow(el){
  let size=10;
  let grow=true;

  setInterval(()=>{
    if(grow){
      size++;
      if(size>25) grow=false;
    } else {
      size--;
      if(size<10) grow=true;
    }

    el.style.textShadow = `
      0 0 ${size}px #ff77b9,
      0 0 ${size*2}px #ff4fa3
    `;
  },60);
}

/* CORAÇÃO */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles=[];

function heart(t){
  return {
    x:16*Math.pow(Math.sin(t),3),
    y:-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
  }
}

function startAnimation(){
  particles=[];

  for(let i=0;i<1200;i++){
    const t=Math.random()*Math.PI*2;
    const p=heart(t);

    particles.push({
      x:canvas.width/2 + p.x*15,
      y:canvas.height/2 + p.y*15
    });
  }

  draw();
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,1.5,0,Math.PI*2);
    ctx.fillStyle="pink";
    ctx.fill();
  });

  requestAnimationFrame(draw);
}
</script>

</body>
</html>
