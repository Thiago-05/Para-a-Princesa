<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Para você ❤️</title>

<style>
:root{
  --pink1:#ff4fa3;
  --pink2:#ff77b9;
  --pink3:#ff9fd2;
  --text:#fff;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family: system-ui;
  color:var(--text);
  overflow:hidden;
}

/* TELAS */
.screen{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* FUNDO LOGIN */
.bg-pink{
  background: linear-gradient(180deg,var(--pink1),var(--pink2),var(--pink3));
}

/* FUNDO FINAL */
.bg-dark{
  background:#07070a;
}

/* CARD */
.card{
  background:#ffffff22;
  padding:30px;
  border-radius:20px;
  text-align:center;
  backdrop-filter: blur(10px);
}

/* INPUT CONTÍNUO */
input{
  font-size:28px;
  padding:12px;
  width:200px;
  border-radius:10px;
  border:none;
  text-align:center;
}

/* BOTÃO */
button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.hide{display:none}

/* TEXTO CENTRAL */
#loveText{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:40px;
  text-align:center;
  color:#ff77b9;
  z-index:10;
  text-shadow:
    0 0 10px #ff77b9,
    0 0 20px #ff4fa3,
    0 0 40px #ff4fa3;
}

/* CANVAS */
canvas{
  position:absolute;
  inset:0;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen bg-pink">
  <div class="card">
    <h2>Digite a senha</h2>
    <input id="password" maxlength="4" placeholder="****">
    <br>
    <button onclick="validate()">Entrar</button>
    <p id="status"></p>
  </div>
</div>

<!-- FINAL -->
<div id="animScreen" class="screen bg-dark hide">
  <h1 id="loveText">Eu adoro você Luna ❤️ !</h1>
  <canvas id="canvas"></canvas>
</div>

<script>
const CORRECT_PASSWORD = "2603";

function validate(){
  const val = document.getElementById("password").value;

  if(val === CORRECT_PASSWORD){
    document.getElementById("loginScreen").classList.add("hide");
    document.getElementById("animScreen").classList.remove("hide");
    startAnimation();
  }else{
    document.getElementById("status").innerText="Senha incorreta";
  }
}

/* ANIMAÇÃO CORAÇÕES */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let hearts = [];

function createHeart(){
  return {
    x: Math.random()*canvas.width,
    y: canvas.height + 20,
    size: Math.random()*6+2,
    speed: Math.random()*2+1,
    alpha: Math.random()
  }
}

function startAnimation(){
  for(let i=0;i<200;i++){
    hearts.push(createHeart());
  }
  animate();
}

function drawHeart(x,y,size){
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.bezierCurveTo(x-size,y-size,x-2*size,y+size,x,y+2*size);
  ctx.bezierCurveTo(x+2*size,y+size,x+size,y-size,x,y);
  ctx.fill();
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  hearts.forEach(h=>{
    h.y -= h.speed;

    ctx.fillStyle = `rgba(255,105,180,${h.alpha})`;
    drawHeart(h.x,h.y,h.size);

    if(h.y < -10){
      Object.assign(h, createHeart());
    }
  });

  requestAnimationFrame(animate);
}
</script>

</body>
</html>
